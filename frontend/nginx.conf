# Configuración de Nginx para Angular SPA + proxy al backend.
#
# Reglas críticas para una SPA con Angular Router:
#   1. try_files: cualquier ruta desconocida se sirve como index.html
#      para que Angular Router la maneje en el cliente.
#   2. /api/v1 y /socket.io se proxifican al backend Express.

server {
    listen 80;
    server_name _;

    # Directorio raíz con los archivos del build de Angular
    root /usr/share/nginx/html;
    index index.html;

    # --- SPA fallback ---
    # Primero intenta el archivo estático; si no existe, sirve index.html.
    # Sin esto, todas las rutas de Angular (excepto /) devuelven 404.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # --- Proxy al backend: API REST ---
    # Redirige /api/v1/* al servicio backend en el puerto 3000
    location /api/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # --- Proxy al backend: Socket.io (WebSocket) ---
    # Requiere upgrade de conexión HTTP → WebSocket
    location /socket.io/ {
        proxy_pass         http://backend:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_cache_bypass $http_upgrade;
    }

    # Páginas de error del servidor (5xx)
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
