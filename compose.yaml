# Azkin — orquestación de PRODUCCIÓN.
# Todas las variables se leen del archivo .env en la raíz del monorepo.
# Docker Compose carga .env automáticamente al ejecutar `docker compose up`.
#
# Uso:
#   docker compose up --build
#
# Para desarrollo con hot-reload usa:
#   docker compose -f compose.dev.yaml up --build
services:
  mongodb:
    image: mongo:8
    container_name: azkin-db
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${AZKIN_MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${AZKIN_MONGO_PASSWORD}
    volumes:
      # Bind mount directo al filesystem del host — sobrevive a 'docker compose down -v'
      - ./data/mongodb:/data/db

  backend:
    build: ./backend
    container_name: azkin-back
    restart: unless-stopped
    depends_on:
      - mongodb
    ports:
      # Puerto del host configurable desde el .env (AZKIN_PORT)
      - "${AZKIN_PORT:-3000}:3000"
    environment:
      AZKIN_PORT: 3000
      AZKIN_MONGO_URI: ${AZKIN_MONGO_URI}
      AZKIN_JWT_SECRET: ${AZKIN_JWT_SECRET}
      AZKIN_JWT_EXPIRES_IN: ${AZKIN_JWT_EXPIRES_IN}
      AZKIN_CHECK_CONCURRENCY: ${AZKIN_CHECK_CONCURRENCY}
      AZKIN_FIRST_CHECK_DELAY_MS: ${AZKIN_FIRST_CHECK_DELAY_MS}
      AZKIN_CORS_ORIGIN: ${AZKIN_CORS_ORIGIN}
      # Seeder del primer administrador — leído directamente del .env raíz
      AZKIN_FIRST_ADMIN_NAME: ${AZKIN_FIRST_ADMIN_NAME}
      AZKIN_FIRST_ADMIN_EMAIL: ${AZKIN_FIRST_ADMIN_EMAIL}
      AZKIN_FIRST_ADMIN_PASSWORD: ${AZKIN_FIRST_ADMIN_PASSWORD}
      AZKIN_PROMETHEUS_USER: ${AZKIN_PROMETHEUS_USER}
      AZKIN_PROMETHEUS_PASS: ${AZKIN_PROMETHEUS_PASS}
      AZKIN_PROMETHEUS_API_KEY: ${AZKIN_PROMETHEUS_API_KEY}

  frontend:
    build: ./frontend
    container_name: azkin-front
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      # Puerto del host configurable desde el .env (AZKIN_FRONTEND_PORT)
      - "${AZKIN_FRONTEND_PORT:-80}:80"

# Nota: ya no se usa named volume para MongoDB. Los datos viven en ./data/mongodb
