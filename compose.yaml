# Azkin — orquestación de PRODUCCIÓN.
# Todas las variables se leen del archivo .env en la raíz del monorepo.
# Docker Compose carga .env automáticamente al ejecutar `docker compose up`.
#
# Uso:
#   docker compose build --no-cache && docker compose up -d
#
# Para desarrollo con hot-reload usa:
#   docker compose -f compose.dev.yaml build --no-cache && docker compose -f compose.dev.yaml up
services:
  azkin-db:
    image: mongo:8
    container_name: azkin-db
    restart: unless-stopped
    networks:
      - azkin-network
    ports:
      # Solo para depuración/administración directa (Compass, mongosh, migraciones).
      # Enlazado a 127.0.0.1: NO queda alcanzable desde la red externa, solo desde
      # el propio servidor — evita colisiones de puerto con otros proyectos en la
      # misma máquina (AZKIN_MONGO_PORT) sin exponer la base de datos a internet.
      # El backend nunca usa este mapeo: se conecta internamente vía
      # AZKIN_MONGO_URI -> azkin-db:27017, dentro de azkin-network.
      - "127.0.0.1:${AZKIN_MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${AZKIN_MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${AZKIN_MONGO_PASSWORD}
    volumes:
      # Bind mount directo al filesystem del host — sobrevive a 'docker compose down -v'
      - ./data/mongodb:/data/db

  backend:
    build:
      context: ./backend
    container_name: azkin-back
    restart: unless-stopped
    depends_on:
      - azkin-db
    networks:
      - azkin-network
    ports:
      # Puerto del host configurable desde el .env (AZKIN_BACK_PORT). El puerto
      # interno (3000) es fijo: coincide con el EXPOSE del Dockerfile y con
      # AZKIN_PORT de abajo, que no se deriva del host para evitar desincronía.
      - "${AZKIN_BACK_PORT:-3000}:3000"
      # Puerto HTTPS nativo, solo se usa si se aplica una configuración TLS
      # desde la UI. Ambos lados deben usar la MISMA variable: el backend escucha
      # internamente en el puerto que el admin eligió en /settings (no un valor
      # fijo del Dockerfile), así que el mapeo host:contenedor debe coincidir con
      # ese mismo número en ambos lados.
      - "${AZKIN_HTTPS_PORT:-8443}:${AZKIN_HTTPS_PORT:-8443}"
      # Puerto mTLS de federación de instancias (AZ-049). Igual criterio que el HTTPS de
      # arriba: si el Admin lo cambia desde /settings → Multi-Región, este valor debe
      # actualizarse a mano en el .env para que el mapeo host:contenedor siga coincidiendo.
      - "${AZKIN_FEDERATION_PORT:-8444}:${AZKIN_FEDERATION_PORT:-8444}"
    extra_hosts:
      # Los checkers HTTP/Puerto/Ping (infrastructure/checkers/same-host-fallback.ts) usan
      # este hostname portable como fallback AUTOMÁTICO cuando un monitor apunta a una IP
      # privada del MISMO servidor físico (otro contenedor suelto, otro docker compose, o
      # un proceso nativo) que no es alcanzable vía su IP LAN desde dentro del contenedor,
      # según el firewall/red del host. Quien configura el monitor no necesita saber nada
      # de esto — sigue usando la IP/dominio real del servicio. Ver docs/instalacion-docker.md §10.
      - "host.docker.internal:host-gateway"
    environment:
      # Puerto interno de escucha del proceso — constante arquitectónica, no un
      # valor configurable por el operador (ver AZKIN_BACK_PORT arriba para exponerlo).
      AZKIN_PORT: 3000
      # Construida a partir de AZKIN_MONGO_USER/AZKIN_MONGO_PASSWORD y del nombre
      # del servicio de Mongo (azkin-db) — evita mantener una URI duplicada y
      # potencialmente desincronizada en el .env.
      AZKIN_MONGO_URI: mongodb://${AZKIN_MONGO_USER}:${AZKIN_MONGO_PASSWORD}@azkin-db:27017/azkin?authSource=admin
      AZKIN_JWT_SECRET: ${AZKIN_JWT_SECRET}
      AZKIN_JWT_EXPIRES_IN: ${AZKIN_JWT_EXPIRES_IN}
      AZKIN_BCRYPT_COST: ${AZKIN_BCRYPT_COST:-10}
      AZKIN_CHECK_CONCURRENCY: ${AZKIN_CHECK_CONCURRENCY}
      AZKIN_FIRST_CHECK_DELAY_MS: ${AZKIN_FIRST_CHECK_DELAY_MS}
      AZKIN_DEGRADED_LATENCY_MS: ${AZKIN_DEGRADED_LATENCY_MS:-5000}
      AZKIN_ACCELERATED_INTERVAL_SECONDS: ${AZKIN_ACCELERATED_INTERVAL_SECONDS:-15}
      AZKIN_CORS_ORIGIN: ${AZKIN_CORS_ORIGIN}
      # Seeder del primer administrador — leído directamente del .env raíz
      AZKIN_FIRST_ADMIN_NAME: ${AZKIN_FIRST_ADMIN_NAME}
      AZKIN_FIRST_ADMIN_EMAIL: ${AZKIN_FIRST_ADMIN_EMAIL}
      AZKIN_FIRST_ADMIN_PASSWORD: ${AZKIN_FIRST_ADMIN_PASSWORD}
      AZKIN_PROMETHEUS_USER: ${AZKIN_PROMETHEUS_USER}
      AZKIN_PROMETHEUS_PASS: ${AZKIN_PROMETHEUS_PASS}
      AZKIN_PROMETHEUS_API_KEY: ${AZKIN_PROMETHEUS_API_KEY}
      # Clave de cifrado en reposo para la clave privada TLS subida desde la UI.
      AZKIN_TLS_ENCRYPTION_KEY: ${AZKIN_TLS_ENCRYPTION_KEY}
      # Puerto por defecto del listener mTLS de federación (AZ-049) hasta que el Admin guarde
      # uno distinto desde /settings → Multi-Región.
      AZKIN_FEDERATION_PORT: ${AZKIN_FEDERATION_PORT:-8444}

  frontend:
    build:
      context: ./frontend
    container_name: azkin-front
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - azkin-network
    ports:
      # Puerto del host configurable desde el .env (AZKIN_FRONTEND_PORT)
      - "${AZKIN_FRONTEND_PORT:-80}:80"

networks:
  azkin-network:
    driver: bridge

# Nota: ya no se usa named volume para MongoDB. Los datos viven en ./data/mongodb
