# Azkin — entorno de DESARROLLO local.
# Lee todas las variables del archivo .env en la raíz del monorepo.
# Docker Compose carga .env automáticamente; no necesitas exportar las variables.
#
# Uso:
#   docker compose -f compose.dev.yaml build --no-cache && docker compose -f compose.dev.yaml up
#
# Para producción usa el compose por defecto:
#   docker compose build --no-cache && docker compose up -d
services:
  azkin-db:
    image: mongo:8
    container_name: azkin-db
    restart: unless-stopped
    networks:
      - azkin-network
    ports:
      # Solo para depuración local (Compass, mongosh). Enlazado a 127.0.0.1 — ver
      # compose.yaml para el detalle. El backend siempre usa azkin-db:27017 interno.
      - "127.0.0.1:${AZKIN_MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${AZKIN_MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${AZKIN_MONGO_PASSWORD}
    volumes:
      - mongo-dev-data:/data/db

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: azkin-back
    restart: unless-stopped
    depends_on:
      - azkin-db
    networks:
      - azkin-network
    ports:
      # Puerto del host configurable desde el .env (AZKIN_BACK_PORT). El puerto
      # interno (3000) es fijo, ver AZKIN_PORT abajo.
      - "${AZKIN_BACK_PORT:-3000}:3000"
      # Puerto HTTPS nativo, solo se usa si se aplica una configuración TLS desde la UI.
      - "${AZKIN_HTTPS_PORT:-8443}:${AZKIN_HTTPS_PORT:-8443}"
    extra_hosts:
      # Ver compose.yaml — permite monitorear servicios del mismo host vía
      # 'host.docker.internal' en vez de su IP LAN.
      - "host.docker.internal:host-gateway"
    environment:
      # Puerto interno de escucha del proceso — constante, no derivado del host.
      AZKIN_PORT: 3000
      # Construida a partir de AZKIN_MONGO_USER/AZKIN_MONGO_PASSWORD y del nombre
      # del servicio de Mongo (azkin-db) — evita una URI duplicada en el .env.
      AZKIN_MONGO_URI: mongodb://${AZKIN_MONGO_USER}:${AZKIN_MONGO_PASSWORD}@azkin-db:27017/azkin?authSource=admin
      AZKIN_JWT_SECRET: ${AZKIN_JWT_SECRET}
      AZKIN_JWT_EXPIRES_IN: ${AZKIN_JWT_EXPIRES_IN:-7200}
      AZKIN_CHECK_CONCURRENCY: ${AZKIN_CHECK_CONCURRENCY:-50}
      AZKIN_FIRST_CHECK_DELAY_MS: ${AZKIN_FIRST_CHECK_DELAY_MS:-1000}
      AZKIN_CORS_ORIGIN: ${AZKIN_CORS_ORIGIN:-*}
      AZKIN_TLS_ENCRYPTION_KEY: ${AZKIN_TLS_ENCRYPTION_KEY}
      # Seeder del primer administrador — leído del .env raíz
      AZKIN_FIRST_ADMIN_NAME: ${AZKIN_FIRST_ADMIN_NAME}
      AZKIN_FIRST_ADMIN_EMAIL: ${AZKIN_FIRST_ADMIN_EMAIL}
      AZKIN_FIRST_ADMIN_PASSWORD: ${AZKIN_FIRST_ADMIN_PASSWORD}
      AZKIN_PROMETHEUS_USER: ${AZKIN_PROMETHEUS_USER}
      AZKIN_PROMETHEUS_PASS: ${AZKIN_PROMETHEUS_PASS}
      AZKIN_PROMETHEUS_API_KEY: ${AZKIN_PROMETHEUS_API_KEY}
      # Activa polling de ficheros en bind-mounts sobre Windows/macOS
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      # Código fuente montado para hot-reload
      - ./backend:/app
      # Preserva el node_modules del contenedor (aislado del host)
      - /app/node_modules

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: azkin-front
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - azkin-network
    ports:
      # Puerto del frontend configurable desde el .env (AZKIN_FRONTEND_PORT)
      - "${AZKIN_FRONTEND_PORT:-4200}:4200"
    environment:
      # Activa polling de ficheros en bind-mounts sobre Windows/macOS
      CHOKIDAR_USEPOLLING: "true"
    volumes:
      # Código fuente montado para hot-reload
      - ./frontend:/app
      # Volumen con nombre para aislar node_modules del contenedor del host.
      # Para invalidar: docker volume rm azkin_frontend_node_modules
      - frontend_node_modules:/app/node_modules

networks:
  azkin-network:
    driver: bridge

volumes:
  mongo-dev-data:
  frontend_node_modules:
